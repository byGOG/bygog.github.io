  <main class="section-notes">
    <div class="section__inner">
      <header class="section__header">
        <span class="section__num" aria-hidden="true">03</span>
        <h1 class="section__title">Notlar</h1>
        <span class="section__line" aria-hidden="true"></span>
      </header>

      <ul class="notes-list" id="notes-list" aria-live="polite"></ul>

      <article class="note-reader" id="note-reader" hidden>
        <a class="note-reader__back" href="/notlar.html">← Tüm notlar</a>
        <div class="prose" id="note-content"></div>
      </article>
    </div>
  </main>

  <!-- SRI hash çevrimiçi bir ortamda hesaplanıp `integrity="sha384-..."` olarak eklenmeli. -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9.1.6/marked.min.js"
          crossorigin="anonymous" referrerpolicy="no-referrer" defer></script>
  <script src="script.js"></script>
  <script src="app.js" defer></script>
  <script>
    (function () {
      function setMeta(selector, value) {
        var el = document.querySelector(selector);
        if (el) el.setAttribute('content', value);
      }
      function updatePostMeta(post, url) {
        document.title = post.title + ' | byGOG';
        var descMeta = document.querySelector('meta[name="description"]');
        if (descMeta && post.excerpt) descMeta.content = post.excerpt;
        setMeta('meta[property="og:title"]', post.title + ' | byGOG');
        setMeta('meta[property="og:url"]', url);
        setMeta('meta[property="og:type"]', 'article');
        setMeta('meta[name="twitter:title"]', post.title + ' | byGOG');
        if (post.excerpt) {
          setMeta('meta[property="og:description"]', post.excerpt);
          setMeta('meta[name="twitter:description"]', post.excerpt);
        }
        // BlogPosting JSON-LD
        var ld = {
          '@context': 'https://schema.org',
          '@type': 'BlogPosting',
          headline: post.title,
          datePublished: post.date,
          dateModified: post.date,
          author: { '@type': 'Person', name: 'Önder GÖG', url: 'https://bygog.github.io' },
          mainEntityOfPage: url,
          image: 'https://bygog.github.io/profil-opt.jpg',
          description: post.excerpt || ''
        };
        var script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(ld);
        document.head.appendChild(script);
      }

      var param = new URLSearchParams(location.search).get('p');


      function waitForMarked(cb) {
        if (typeof marked !== 'undefined') { cb(); return; }
        var tries = 0;
        var t = setInterval(function () {
          if (typeof marked !== 'undefined' || ++tries > 60) {
            clearInterval(t); cb();
          }
        }, 50);
      }

      if (param) {
        document.getElementById('notes-list').hidden = true;
        var reader = document.getElementById('note-reader');
        reader.hidden = false;

        var postUrl = 'https://bygog.github.io/notlar.html?p=' + encodeURIComponent(param);

        // Meta/JSON-LD güncellemesi için index.json'dan yazı bilgisini çek
        fetch('posts/index.json')
          .then(function (r) { return r.ok ? r.json() : []; })
          .then(function (posts) {
            var post = (posts || []).find(function (p) { return p.slug === param; });
            if (post) updatePostMeta(post, postUrl);
          })
          .catch(function () {});

        fetch('posts/' + encodeURIComponent(param) + '.md')
          .then(function (r) { return r.ok ? r.text() : null; })
          .then(function (md) {
            var content = document.getElementById('note-content');
            if (!md) {
              content.textContent = 'Yazı bulunamadı.';
              return;
            }
            waitForMarked(function () {
              if (typeof marked !== 'undefined') {
                content.innerHTML = marked.parse(md);
              } else {
                content.textContent = md;
              }
              var h1 = content.querySelector('h1');
              if (h1) document.title = h1.textContent + ' | byGOG';
            });
          })
          .catch(function () {
            document.getElementById('note-content').textContent =
              'Yüklenirken hata oluştu.';
          });
      } else {
        fetch('posts/index.json')
          .then(function (r) { return r.json(); })
          .then(function (posts) {
            var list = document.getElementById('notes-list');
            if (!posts.length) {
              var empty = document.createElement('li');
              empty.className = 'note-item note-item--empty';
              empty.textContent = 'Henüz yazı yok.';
              list.appendChild(empty);
              return;
            }
            posts.forEach(function (post) {
              var li = document.createElement('li');
              li.className = 'note-item';

              var a = document.createElement('a');
              a.className = 'note-item__link';
              a.href = '/notlar.html?p=' + encodeURIComponent(post.slug);

              var titleEl = document.createElement('span');
              titleEl.className = 'note-item__title';
              titleEl.textContent = post.title;

              var dateEl = document.createElement('time');
              dateEl.className = 'note-item__date';
              dateEl.dateTime = post.date;
              dateEl.textContent = new Date(post.date + 'T12:00:00').toLocaleDateString(
                'tr-TR',
                { year: 'numeric', month: 'long', day: 'numeric' }
              );

              a.appendChild(titleEl);
              a.appendChild(dateEl);
              li.appendChild(a);

              if (post.excerpt) {
                var excerpt = document.createElement('p');
                excerpt.className = 'note-item__excerpt';
                excerpt.textContent = post.excerpt;
                li.appendChild(excerpt);
              }

              list.appendChild(li);
            });
          })
          .catch(function () {
            var list = document.getElementById('notes-list');
            var empty = document.createElement('li');
            empty.className = 'note-item note-item--empty';
            empty.textContent = 'Yazılar yüklenemedi.';
            list.appendChild(empty);
          });
      }
    })();
  </script>

</body>

</html>
